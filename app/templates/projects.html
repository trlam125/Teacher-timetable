<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Danh sách thời khóa biểu</title><script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches)){document.documentElement.classList.add('dark-mode');}})();function toggleTheme(){const isDark=document.documentElement.classList.toggle('dark-mode');localStorage.setItem('theme',isDark?'dark':'light');}</script><link rel="stylesheet" href="/static/style.css"><link rel="stylesheet" href="/static/effects.css?v=2"><link rel="stylesheet" href="/static/front.css?v=1"></head><body class="front-surface"><header class="appbar"><b>Smart TKB</b><div class="spacer"></div><button class="theme-toggle-btn" style="margin-right:10px" onclick="toggleTheme()" title="Đổi giao diện Sáng/Tối" aria-label="Đổi giao diện Sáng/Tối"><svg class="theme-toggle-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg><svg class="theme-toggle-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button><span>Xin chào, {{user.name}}</span><a href="/admin/users">Quản lý tài khoản</a><a href="/logout">Đăng xuất</a></header><main class="container"><div class="page-title"><div><h1>Bộ thời khóa biểu</h1><p>Tạo và quản lý các phương án của nhà trường.</p></div><button class="btn" onclick="document.querySelector('#newProject').showModal()">+ Tạo mới</button></div><div class="project-grid">{% for p in projects %}<article class="project-card"><div><span class="pill">{{p.school_name}}</span><h3>{{p.name}}</h3><p>{{p.days}} ngày · {{p.sessions}} buổi · {{p.periods_per_session}} tiết/buổi</p></div><div class="row"><a class="btn" href="/projects/{{p.id}}">Mở</a><form method="post" action="/projects/{{p.id}}/clone"><button class="btn ghost">Nhân bản</button></form></div></article>{% endfor %}</div></main><dialog id="newProject"><form method="post" action="/projects" class="modal-form"><h2>Tạo bộ thời khóa biểu</h2><label>Tên bộ TKB<input name="name" value="TKB học kỳ I" required></label><label>Tên trường<input name="school_name" required></label><div class="form-grid"><label>Số ngày học<input type="number" name="days" min="1" max="7" value="6"></label><label>Số buổi/ngày<select name="sessions"><option value="1">1 buổi</option><option value="2" selected>2 buổi</option></select></label><label>Số tiết/buổi<input type="number" name="periods" min="1" max="8" value="5"></label></div><div class="row end"><button type="button" class="btn ghost" onclick="this.closest('dialog').close()">Hủy</button><button class="btn">Tạo</button></div></form></dialog></body></html>
