<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Danh sách thời khóa biểu</title><link rel="stylesheet" href="/static/style.css"><link rel="stylesheet" href="/static/effects.css?v=2"><link rel="stylesheet" href="/static/front.css?v=1"></head><body class="front-surface"><header class="appbar"><b>Smart TKB</b><span>Xin chào, {{user.name}}</span><a href="/admin/users">Quản lý tài khoản</a><a href="/logout">Đăng xuất</a></header><main class="container"><div class="page-title"><div><h1>Bộ thời khóa biểu</h1><p>Tạo và quản lý các phương án của nhà trường.</p></div><button class="btn" onclick="document.querySelector('#newProject').showModal()">+ Tạo mới</button></div><div class="project-grid">{% for p in projects %}<article class="project-card"><div><span class="pill">{{p.school_name}}</span><h3>{{p.name}}</h3><p>{{p.days}} ngày · {{p.sessions}} buổi · {{p.periods_per_session}} tiết/buổi</p></div><div class="row"><a class="btn" href="/projects/{{p.id}}">Mở</a><form method="post" action="/projects/{{p.id}}/clone"><button class="btn ghost">Nhân bản</button></form></div></article>{% endfor %}</div></main><dialog id="newProject"><form method="post" action="/projects" class="modal-form"><h2>Tạo bộ thời khóa biểu</h2><label>Tên bộ TKB<input name="name" value="TKB học kỳ I" required></label><label>Tên trường<input name="school_name" required></label><div class="form-grid"><label>Số ngày học<input type="number" name="days" min="1" max="7" value="6"></label><label>Số buổi/ngày<select name="sessions"><option value="1">1 buổi</option><option value="2" selected>2 buổi</option></select></label><label>Số tiết/buổi<input type="number" name="periods" min="1" max="8" value="5"></label></div><div class="row end"><button type="button" class="btn ghost" onclick="this.closest('dialog').close()">Hủy</button><button class="btn">Tạo</button></div></form></dialog></body></html>
