<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Đặt lại mật khẩu</title>
  <script>(function(){const t=localStorage.getItem('theme');if(t==='dark'){document.documentElement.classList.add('dark-mode');}})();</script>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/effects.css?v=2">
  <link rel="stylesheet" href="/static/auth-extra.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <a class="brand" href="/">Smart TKB</a><h1>Đặt lại mật khẩu</h1>
    {% if success %}
      <div class="alert success">Mật khẩu đã được cập nhật thành công.</div><a class="btn wide" href="/login">Đăng nhập</a>
    {% elif not valid %}
      <div class="alert error">Liên kết đặt lại mật khẩu không hợp lệ, đã hết hạn hoặc đã được sử dụng.</div><a class="btn wide" href="/forgot-password">Tạo yêu cầu mới</a>
    {% else %}
      {% if error %}<div class="alert error">{{error}}</div>{% endif %}
      <form method="post">
        <label>Mật khẩu mới<input type="password" name="password" minlength="6" autocomplete="new-password" required></label>
        <label>Nhập lại mật khẩu<input type="password" name="password_confirm" minlength="6" autocomplete="new-password" required></label>
        <button class="btn wide">Cập nhật mật khẩu</button>
      </form>
    {% endif %}
  </main>
</body>
</html>
