<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{p.name}}</title>
  <script>(function(){const t=localStorage.getItem('theme');if(t==='dark'){document.documentElement.classList.add('dark-mode');}})();function toggleTheme(){const isDark=document.documentElement.classList.toggle('dark-mode');localStorage.setItem('theme',isDark?'dark':'light');}</script>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/effects.css?v=2">
  <link rel="stylesheet" href="/static/front.css?v=1">
</head>
<body class="front-surface">
  <header class="appbar">
    <b>Smart TKB · Chế độ chia sẻ</b>
    <div class="spacer"></div>
    <button class="theme-toggle-btn" style="margin-right:10px" onclick="toggleTheme()" title="Đổi giao diện Sáng/Tối" aria-label="Đổi giao diện Sáng/Tối"><svg class="theme-toggle-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg><svg class="theme-toggle-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
    <a class="btn ghost" href="/login">Đăng nhập giáo viên</a>
    <button class="btn" onclick="window.print()">In / PDF</button>
  </header>
  <main class="container">
    <div class="section-head">
      <div><h1>{{p.name}}</h1><p>{{p.school_name}}</p></div>
      <div class="row">
        <select id="viewType"><option value="overview" selected>Xem tổng quát</option><option value="class">Xem theo lớp</option><option value="teacher">Xem theo giáo viên</option></select>
        <select id="viewEntity"></select>
      </div>
    </div>
    <div id="scheduleGrid"></div>
  </main>
  <script>window.PROJECT_ID={{p.id}};window.INIT_DATA={{data|tojson}};window.READ_ONLY=true;</script>
  <script src="/static/app.js?v=25"></script>
</body>
</html>
